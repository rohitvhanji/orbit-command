<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <style>
        :root { --orbit-slate: #020617; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--orbit-slate); 
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* Background */
        .bg-mesh { 
            position: absolute; inset: -50%; width: 200%; height: 200%; 
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/8/83/Equirectangular_projection_SW.jpg'); 
            background-size: cover; background-position: center;
            opacity: 0.2; filter: invert(1) hue-rotate(220deg) saturate(0.2);
            z-index: 0; animation: drift 200s linear infinite; 
        }
        @keyframes drift { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Card */
        .login-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 2.5rem; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative; z-index: 10;
            width: 100%; max-width: 450px; padding: 3rem;
            text-align: center;
        }

        /* Inputs */
        .input-light {
            background: #F8FAFC; border: 1px solid #E2E8F0; color: #0F172A; transition: all 0.3s ease;
        }
        .input-light:focus {
            background: white; border-color: #8B5CF6; outline: none; box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
        }

        /* Buttons */
        .btn-primary { background: #0F172A; color: white; transition: all 0.3s; }
        .btn-primary:hover { background: #1E293B; transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.3); }
        
        .btn-secondary { background: white; color: #0F172A; border: 2px solid #E2E8F0; transition: all 0.3s; }
        .btn-secondary:hover { border-color: #0F172A; transform: translateY(-2px); }

        .btn-outline { background: transparent; color: #64748B; border: 1px dashed #CBD5E1; transition: all 0.3s; }
        .btn-outline:hover { border-color: #7C3AED; color: #7C3AED; background: #F5F3FF; }

        .kindness-purple {
            background: linear-gradient(135deg, #7C3AED 0%, #A855F7 50%, #6366F1 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    
    <div class="bg-mesh"></div>

    <div class="login-card">
        <div class="mb-8">
            <span class="text-6xl font-black tracking-tighter kindness-purple drop-shadow-sm block mb-4">orbit</span>
            <h1 class="text-2xl font-bold text-slate-900 mb-1">Welcome Back</h1>
            <p class="text-slate-500 text-sm font-medium">Sync your global team.</p>
        </div>

        <div id="step-1" class="flex flex-col gap-3">
            <input type="email" id="auth-email" class="input-light w-full p-4 rounded-2xl font-bold text-sm" placeholder="Email Address">
            <input type="password" id="auth-pass" class="input-light w-full p-4 rounded-2xl font-bold text-sm" placeholder="Password">
            
            <button onclick="handleAuth('login')" class="btn-primary w-full py-4 rounded-2xl font-black uppercase tracking-[0.15em] text-xs mt-2">
                Log In
            </button>
            
            <div class="relative flex py-2 items-center">
                <div class="flex-grow border-t border-slate-200"></div>
                <span class="flex-shrink mx-4 text-slate-300 text-xs font-bold uppercase">OR</span>
                <div class="flex-grow border-t border-slate-200"></div>
            </div>

            <button onclick="sendMagicCode()" class="btn-outline w-full py-3 rounded-2xl font-bold text-xs uppercase tracking-wider">
                Send me a Login Code
            </button>
            
            <button onclick="handleAuth('signup')" class="text-slate-400 text-xs font-bold hover:text-slate-600 mt-2">
                Create New Account
            </button>
        </div>

        <div id="step-2" class="hidden flex flex-col gap-4 animate-fade-in">
            <div class="bg-indigo-50 text-indigo-900 p-4 rounded-2xl text-xs font-bold mb-2 border border-indigo-100">
                Check your email!<br>We sent you a 6-digit code.
            </div>
            
            <input type="text" id="auth-code" class="input-light w-full p-4 rounded-2xl font-bold text-center text-3xl tracking-[0.5em] text-indigo-600" placeholder="000000" maxlength="6">
            
            <button onclick="verifyCode()" class="btn-primary w-full py-4 rounded-2xl font-black uppercase tracking-[0.15em] text-xs mt-2">
                Verify Code
            </button>
            
            <button onclick="cancelCode()" class="text-xs font-bold text-slate-400 mt-4 hover:text-slate-600 uppercase tracking-wider">
                &larr; Go Back
            </button>
        </div>

        <div id="auth-status" class="mt-4 text-red-500 text-xs font-bold min-h-[20px]"></div>
    </div>

    <script>
        if (typeof CONFIG === 'undefined') { console.error("config.js missing"); }
        const _supabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

        // --- 1. Standard Login ---
        async function handleAuth(type) {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-pass').value;
            const statusDiv = document.getElementById('auth-status');
            
            if(!email || !password) {
                statusDiv.innerText = "Please enter email and password.";
                return;
            }

            statusDiv.innerText = "Processing...";
            statusDiv.className = "mt-4 text-slate-500 text-xs font-bold";
            
            const { data, error } = type === 'login' 
                ? await _supabase.auth.signInWithPassword({ email, password }) 
                : await _supabase.auth.signUp({ email, password });

            if (error) {
                statusDiv.innerText = error.message;
                statusDiv.className = "mt-4 text-red-500 text-xs font-bold";
            } else {
                if (type === 'signup' && !data.session) {
                    statusDiv.innerText = "Check your email to confirm signup!";
                    statusDiv.className = "mt-4 text-green-600 text-xs font-bold";
                } else {
                    window.location.href = 'app.html';
                }
            }
        }

        // --- 2. Send Magic Code ---
        async function sendMagicCode() {
            const email = document.getElementById('auth-email').value;
            const statusDiv = document.getElementById('auth-status');

            if (!email) {
                statusDiv.innerText = "Enter your email address above first.";
                statusDiv.className = "mt-4 text-red-500 text-xs font-bold";
                return;
            }

            statusDiv.innerText = "Sending code...";
            statusDiv.className = "mt-4 text-slate-500 text-xs font-bold";
            
            const { data, error } = await _supabase.auth.signInWithOtp({ email });

            if (error) {
                statusDiv.innerText = error.message;
                statusDiv.className = "mt-4 text-red-500 text-xs font-bold";
            } else {
                statusDiv.innerText = "";
                // HIDE Login Form, SHOW Code Form
                document.getElementById('step-1').classList.add('hidden');
                document.getElementById('step-2').classList.remove('hidden');
            }
        }

        // --- 3. Verify Code ---
        async function verifyCode() {
            const email = document.getElementById('auth-email').value;
            const token = document.getElementById('auth-code').value;
            const statusDiv = document.getElementById('auth-status');

            statusDiv.innerText = "Verifying...";
            
            const { data, error } = await _supabase.auth.verifyOtp({
                email,
                token,
                type: 'email'
            });

            if (error) {
                statusDiv.innerText = "Invalid code. Try again.";
                statusDiv.className = "mt-4 text-red-500 text-xs font-bold";
            } else {
                window.location.href = 'app.html';
            }
        }

        // --- 4. Cancel / Back ---
        function cancelCode() {
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-1').classList.remove('hidden');
            document.getElementById('auth-status').innerText = "";
        }
    </script>
</body>
</html>
